<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test ZXing</title>
<script src="https://unpkg.com/@zxing/browser@0.1.5"></script>
<style>
  body{ font-family:sans-serif; background:#111; color:#eee; padding:16px; text-align:center; }
  video{ width:100%; max-width:400px; border:3px solid #0f0; border-radius:12px; background:#000; }
  #log{ text-align:left; background:#000; color:#0f0; font-family:monospace; font-size:12px;
    padding:12px; border-radius:8px; margin-top:12px; white-space:pre-wrap; min-height:100px; }
  .hit{ color:#ff0; font-weight:bold; font-size:18px; }
  button{ font-size:16px; padding:12px 20px; margin:6px; border-radius:10px; border:none; background:#0a0; color:#fff; }
</style>
</head>
<body>
  <h2>Test lector ZXing</h2>
  <button id="start">▶️ Encender cámara</button>
  <button id="flip">🔄 Cambiar cámara</button>
  <br>
  <video id="video" playsinline muted></video>
  <div id="log">Pulsa "Encender cámara" y apunta a cualquier QR.</div>

<script>
  const log = document.getElementById('log');
  const video = document.getElementById('video');
  let reader = null, controls = null, devices = [], idx = 0;

  function L(msg){ log.textContent = msg + '\n' + log.textContent.slice(0, 1800); }

  window.addEventListener('load', () => {
    if(typeof ZXingBrowser === 'undefined'){
      L('❌ ZXingBrowser NO cargó (CDN bloqueado o sin internet)');
    } else {
      L('✓ ZXingBrowser cargado correctamente');
    }
  });

  async function start(){
    if(controls){ try{ controls.stop(); }catch(e){} }
    if(typeof ZXingBrowser === 'undefined'){ L('❌ La librería no está disponible'); return; }
    try{
      if(!reader) reader = new ZXingBrowser.BrowserQRCodeReader();
      if(!devices.length){
        devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
        L('Cámaras detectadas: ' + devices.length);
        devices.forEach((d,i) => L('  [' + i + '] ' + (d.label || 'sin nombre')));
        const back = devices.findIndex(d => /back|rear|tras|environment/i.test(d.label));
        idx = back >= 0 ? back : (devices.length - 1);
        L('Usando cámara índice ' + idx);
      }
      const id = devices.length ? devices[idx].deviceId : undefined;
      L('▶️ Iniciando... apunta a un QR');
      controls = await reader.decodeFromVideoDevice(id, video, (result, err) => {
        if(result){
          L('✅✅✅ QR DETECTADO: ' + result.getText());
          document.querySelector('h2').innerHTML = '<span class="hit">✅ ' + result.getText() + '</span>';
        }
      });
      L('✓ Cámara activa, escaneando...');
    }catch(e){
      L('❌ ERROR: ' + (e.name || '') + ' — ' + (e.message || e));
    }
  }

  document.getElementById('start').onclick = start;
  document.getElementById('flip').onclick = () => {
    if(devices.length > 1){ idx = (idx + 1) % devices.length; L('Cambiando a cámara ' + idx); start(); }
  };
</script>
</body>
</html>
