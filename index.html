<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Mi Tarjeta · La Gelateria de Roses</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#033E3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Tarjeta">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="firebase-config.js?v=cliente-staff-sync-final"></script>
<style>
:root{--teal:#0B7E7C;--deep:#033E3C;--gold:#F0B429;--gold2:#FFD45E;--cream:#FFFCF5;--ink:#193936;--muted:#5C7B79;--danger:#B4423A}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%}body{font-family:Inter,sans-serif;background:radial-gradient(circle at 10% 0%,rgba(255,212,94,.12),transparent 38%),linear-gradient(160deg,#033E3C,#075d59 70%,#0B7E7C);color:var(--cream);padding:24px 16px;display:flex;justify-content:center}.app{width:100%;max-width:430px}.langs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}.langs button{border:1px solid rgba(240,180,41,.4);background:transparent;color:rgba(255,252,245,.72);border-radius:20px;padding:6px 10px;font-size:11px;font-weight:800}.langs button.on{background:var(--gold);color:var(--deep)}header{text-align:center;margin-bottom:18px}.logo{width:70px;height:70px;margin:0 auto 10px}.logo img{width:100%;height:100%;object-fit:contain;border-radius:18px}h1{font-family:'Cormorant Garamond',serif;font-size:33px;line-height:1;color:var(--cream)}h1 span{color:var(--gold);font-style:italic}.subtop{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);font-weight:800;margin-bottom:8px}.card{background:var(--cream);color:var(--ink);border-radius:24px;padding:24px 20px;box-shadow:0 22px 60px rgba(0,0,0,.25);border:1px solid rgba(240,180,41,.5);text-align:center}.screen{display:none}.screen.on{display:block;animation:up .25s ease both}@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.intro{font-size:15px;color:var(--muted);line-height:1.5;margin-bottom:18px}.field{text-align:left;margin-bottom:12px}.field label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}input{width:100%;font-size:18px;font-weight:700;padding:14px;border-radius:14px;border:1.5px solid rgba(11,126,124,.25);background:#FAF6EB;color:var(--ink);outline:none}.row{display:flex;gap:8px}.row select{width:110px;border-radius:14px;border:1.5px solid rgba(11,126,124,.25);background:#FAF6EB;color:var(--ink);font-size:16px;font-weight:800;padding:12px 6px}.consent{display:flex;gap:10px;text-align:left;margin:12px 0 16px}.consent input{width:22px;height:22px;flex:none;accent-color:var(--teal)}.consent span{font-size:12px;color:var(--muted);line-height:1.45}.consent a{color:var(--teal);font-weight:800}.btn{width:100%;border:0;border-radius:15px;background:var(--deep);color:var(--gold2);font-size:16px;font-weight:900;padding:16px;cursor:pointer}.btn.secondary{background:#fff;border:1.5px solid rgba(11,126,124,.25);color:var(--deep)}.hello{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--deep);margin-bottom:4px}.status{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:14px}.status.prize{font-size:24px;color:var(--gold);background:rgba(240,180,41,.12);border:1.5px solid var(--gold);border-radius:16px;padding:12px}.stamps{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px auto;max-width:315px}.stamp{aspect-ratio:1;border-radius:50%;border:2px dashed rgba(11,126,124,.25);display:grid;place-items:center;font-size:24px}.stamp.f{background:linear-gradient(135deg,var(--gold2),var(--gold));border:2px solid #C4910E;box-shadow:0 4px 12px rgba(196,145,14,.3)}.stamp.pop{animation:pop .45s ease both}@keyframes pop{0%{transform:scale(.1)}70%{transform:scale(1.18)}100%{transform:scale(1)}}.progress{height:12px;border-radius:20px;background:rgba(11,126,124,.12);overflow:hidden;margin:10px 0 8px}.bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));width:0;transition:.3s}.count{font-size:16px;font-weight:900;color:var(--deep);margin-bottom:14px}.wallet{display:none;border:2px solid var(--gold);border-radius:18px;background:rgba(240,180,41,.13);padding:14px;margin:12px 0}.wallet.show{display:block}.wallet b{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--deep)}.wallet p{font-size:13px;color:var(--muted);line-height:1.4;margin-top:3px}.qrbox{background:#fff;display:inline-block;padding:14px;border-radius:18px;border:1px solid rgba(11,126,124,.18);margin:12px 0}.note{font-size:13px;color:var(--muted);line-height:1.45}.install{display:none;text-align:left;margin-top:14px;padding:14px;border-radius:16px;background:rgba(240,180,41,.13);border:1.5px solid rgba(240,180,41,.45);font-size:13px;color:var(--muted);line-height:1.5}.install.show{display:block}.install b{display:block;color:var(--deep);font-size:16px;margin-bottom:5px}.small{font-size:11px;color:var(--muted);margin-top:16px;background:none;border:0;text-decoration:underline}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#032B29;color:#fff;padding:13px 18px;border-radius:14px;opacity:0;pointer-events:none;transition:.2s;font-weight:800;z-index:99}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.cele{position:fixed;inset:0;background:rgba(3,43,41,.88);display:none;align-items:center;justify-content:center;padding:24px;z-index:60}.cele.show{display:flex}.celebox{background:var(--cream);color:var(--ink);border:2px solid var(--gold);border-radius:28px;max-width:350px;width:100%;padding:32px 22px;text-align:center;animation:pop .35s ease both}.celebox .big{font-size:60px}.celebox h2{font-family:'Cormorant Garamond',serif;font-size:31px;color:var(--deep)}.celebox p{font-size:15px;color:var(--muted);line-height:1.45;margin-top:8px}footer{text-align:center;color:rgba(255,252,245,.45);font-size:12px;margin-top:18px}footer a{color:rgba(255,252,245,.65)}
</style>
</head>
<body>
<div class="app">
  <div class="langs" id="langs"></div>
  <header><div class="logo"><img src="logo-gelateria.png" alt="La Gelateria de Roses"></div><div class="subtop">La Gelateria de Roses</div><h1>Mi Tarjeta <span>fidelidad</span></h1></header>
  <div class="card">
    <section class="screen on" id="form">
      <p class="intro" data-t="intro">Crea tu tarjeta en 10 segundos. Cada compra suma sellos, sin papel y sin perderla.</p>
      <div class="field"><label data-t="name">Nombre opcional</label><input id="name" type="text" placeholder="Marta"></div>
      <div class="field"><label data-t="phone">Móvil</label><div class="row"><select id="prefix"><option value="+34">🇪🇸 +34</option><option value="+33">🇫🇷 +33</option><option value="+376">🇦🇩 +376</option><option value="+49">🇩🇪 +49</option><option value="+31">🇳🇱 +31</option></select><input id="phone" type="tel" inputmode="numeric" placeholder="6XX XXX XXX"></div></div>
      <label class="consent"><input id="consent" type="checkbox"><span data-t="consent">Acepto que La Gelateria de Roses use mi nombre y móvil solo para gestionar mi tarjeta. <a href="privacidad.html" target="_blank">Política de privacidad</a>.</span></label>
      <button class="btn" id="create" data-t="create">Crear mi tarjeta</button>
    </section>
    <section class="screen" id="card">
      <div class="hello" id="hello">¡Hola!</div>
      <div class="status" id="status"></div>
      <div class="stamps" id="stamps"></div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="count" id="count"></div>
      <div class="wallet" id="wallet"><b id="walletTitle"></b><p data-t="walletText">Enséñalo en el mostrador cuando quieras canjearlo. No caduca.</p></div>
      <div class="qrbox"><div id="qr"></div></div>
      <p class="note" data-t="qrnote">Enséñanos este QR cada vez que compres.</p>
      <button class="btn secondary" id="shareBtn">📲 Compartir / guardar tarjeta</button>
      <div class="install" id="install"><b id="installTitle"></b><div id="installText"></div></div>
      <button class="small" id="deleteBtn" data-t="delete">Eliminar mi tarjeta de este móvil</button>
    </section>
  </div>
  <footer>La Gelateria de Roses · <a href="privacidad.html">Privacidad</a></footer>
</div>
<div class="cele" id="cele"><div class="celebox"><div class="big">🎉</div><h2 id="celeTitle"></h2><p id="celeText"></p></div></div>
<div class="toast" id="toast"></div>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  initializeFirestore,
  persistentLocalCache,
  doc,
  getDoc,
  setDoc,
  onSnapshot,
  serverTimestamp,
  enableNetwork
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const $ = id => document.getElementById(id);
let db = null;
let unsub = null;
let currentCardId = null;
let lastSellos = 0;
let lang = localStorage.getItem('gelateria_lang') || 'es';

const TXT = {
  es:{intro:'Crea tu tarjeta en 10 segundos. Cada compra suma sellos, sin papel y sin perderla.',name:'Nombre opcional',phone:'Móvil',consent:'Acepto que La Gelateria de Roses use mi nombre y móvil solo para gestionar mi tarjeta. <a href="privacidad.html" target="_blank">Política de privacidad</a>.',create:'Crear mi tarjeta',qrnote:'Enséñanos este QR cada vez que compres.',delete:'Eliminar mi tarjeta de este móvil',missing:'Faltan {n} sellos',missing1:'Falta 1 sello',prize:'🎁 PREMIO DISPONIBLE',count:'{s}/10 sellos',wallet1:'1 premio pendiente',walletN:'{n} premios pendientes',saved:'¡Felicidades! Ya tienes tu tarjeta',installTitle:'Guárdala como app',installIos:'iPhone: toca Compartir → Añadir a pantalla de inicio. También puedes guardar esta página en favoritos.',installAndroid:'Android: toca el menú ⋮ → Añadir a pantalla de inicio o Instalar app.',cele:'¡Tarjeta creada!',celeText:'Enséñanos este QR cada vez que compres.'},
  ca:{intro:'Crea la teva targeta en 10 segons. Cada compra suma segells, sense paper i sense perdre-la.',name:'Nom opcional',phone:'Mòbil',consent:'Accepto que La Gelateria de Roses faci servir el meu nom i mòbil només per gestionar la targeta. <a href="privacidad.html" target="_blank">Política de privacitat</a>.',create:'Crear la meva targeta',qrnote:'Ensenya aquest QR cada vegada que compris.',delete:'Eliminar la targeta d’aquest mòbil',missing:'Falten {n} segells',missing1:'Falta 1 segell',prize:'🎁 PREMI DISPONIBLE',count:'{s}/10 segells',wallet1:'1 premi pendent',walletN:'{n} premis pendents',saved:'Felicitats! Ja tens la teva targeta',installTitle:'Guarda-la com app',installIos:'iPhone: toca Compartir → Afegir a pantalla d’inici.',installAndroid:'Android: toca el menú ⋮ → Afegir a pantalla d’inici o Instal·lar app.',cele:'Targeta creada!',celeText:'Ensenya aquest QR cada vegada que compris.'},
  fr:{intro:'Créez votre carte en 10 secondes. Chaque achat ajoute des tampons, sans papier.',name:'Nom optionnel',phone:'Mobile',consent:'J’accepte que La Gelateria de Roses utilise mon nom et mon mobile uniquement pour gérer ma carte. <a href="privacidad.html" target="_blank">Confidentialité</a>.',create:'Créer ma carte',qrnote:'Montrez ce QR à chaque achat.',delete:'Supprimer ma carte de ce téléphone',missing:'Encore {n} tampons',missing1:'Encore 1 tampon',prize:'🎁 RÉCOMPENSE DISPONIBLE',count:'{s}/10 tampons',wallet1:'1 récompense en attente',walletN:'{n} récompenses en attente',saved:'Félicitations ! Votre carte est prête',installTitle:'Ajoutez-la à l’écran d’accueil',installIos:'iPhone : Partager → Sur l’écran d’accueil.',installAndroid:'Android : menu ⋮ → Ajouter à l’écran d’accueil ou Installer.',cele:'Carte créée !',celeText:'Montrez ce QR à chaque achat.'},
  en:{intro:'Create your card in 10 seconds. Every purchase adds stamps, no paper needed.',name:'Optional name',phone:'Mobile',consent:'I accept that La Gelateria de Roses uses my name and mobile only to manage my loyalty card. <a href="privacidad.html" target="_blank">Privacy policy</a>.',create:'Create my card',qrnote:'Show us this QR whenever you buy.',delete:'Remove my card from this phone',missing:'{n} stamps to go',missing1:'1 stamp to go',prize:'🎁 REWARD AVAILABLE',count:'{s}/10 stamps',wallet1:'1 reward pending',walletN:'{n} rewards pending',saved:'Congratulations! Your card is ready',installTitle:'Save it as an app',installIos:'iPhone: tap Share → Add to Home Screen.',installAndroid:'Android: tap ⋮ → Add to Home screen or Install app.',cele:'Card created!',celeText:'Show us this QR whenever you buy.'}
};

function t(k,p={}) {
  let s=(TXT[lang]||TXT.es)[k]||TXT.es[k]||k;
  for(const [a,b] of Object.entries(p)) s=s.replaceAll('{'+a+'}',b);
  return s;
}
function toast(m) {
  const el=$('toast');
  if(!el) return;
  el.textContent=m;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function show(which) {
  $('form').classList.toggle('on',which==='form');
  $('card').classList.toggle('on',which==='card');
}
function cleanPhone() {
  return $('prefix').value + $('phone').value.replace(/\D/g,'');
}
function makeToken() {
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out='';
  for(let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
function withTimeout(promise, ms, label='timeout') {
  let timer;
  return Promise.race([
    promise.finally(()=>clearTimeout(timer)),
    new Promise((_,reject)=>{ timer=setTimeout(()=>reject(new Error(label)),ms); })
  ]);
}
function renderLangs() {
  $('langs').innerHTML=['es','ca','fr','en'].map(l=>`<button class="${l===lang?'on':''}" data-l="${l}">${l.toUpperCase()}</button>`).join('');
  $('langs').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    lang=b.dataset.l;
    localStorage.setItem('gelateria_lang',lang);
    applyLang();
    renderLangs();
    if(currentCardId) renderInstall();
  });
}
function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el=>{el.innerHTML=t(el.dataset.t)});
}

function initFirebase() {
  const cfg=window.FIREBASE_CONFIG||{};
  if(!cfg.apiKey || String(cfg.apiKey).includes('PEGAR')) {
    toast('Falta firebase-config.js');
    return false;
  }
  try {
    const app=initializeApp(cfg);
    try { db=initializeFirestore(app,{localCache:persistentLocalCache()}); }
    catch(e) { db=initializeFirestore(app,{}); }
    enableNetwork(db).catch(()=>{});
    return true;
  } catch(e) {
    console.error('Firebase init', e);
    toast('Error Firebase');
    return false;
  }
}

async function resolveCardId(phone) {
  try {
    const telSnap = await withTimeout(getDoc(doc(db,'telefonos',phone)), 3500, 'lectura lenta');
    if(telSnap.exists() && telSnap.data().cardId) return telSnap.data().cardId;
  } catch(e) {
    console.warn('No se pudo mirar telefono existente, crearé nueva tarjeta si hace falta:', e);
  }
  return null;
}

function renderLocalCreatedCard(cardId, data) {
  currentCardId = cardId;
  show('card');

  $('hello').textContent = data.nombre ? `¡Hola, ${data.nombre}!` : '¡Hola!';
  $('status').className='status';
  $('status').textContent='Faltan 10 sellos';

  $('stamps').innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='stamp';
    d.textContent='';
    $('stamps').appendChild(d);
  }

  $('bar').style.width='0%';
  $('count').textContent='0/10 sellos';
  $('wallet').classList.remove('show');

  $('qr').innerHTML='';
  new QRCode($('qr'),{text:cardId,width:210,height:210,colorDark:'#033E3C',colorLight:'#ffffff'});

  renderInstall();
}

async function create() {
  if(!db) { toast('Firebase no está listo'); return; }

  const btn=$('create');
  const oldText=btn.textContent;
  btn.disabled=true;
  btn.textContent='Creando…';

  const phone=cleanPhone();
  const nombre=$('name').value.trim();

  if(phone.length < 8) {
    toast('Móvil incompleto');
    btn.disabled=false;
    btn.textContent=oldText;
    return;
  }
  if(!$('consent').checked) {
    toast('Acepta la privacidad');
    btn.disabled=false;
    btn.textContent=oldText;
    return;
  }

  try {
    let cardId = await resolveCardId(phone);

    let token = '';
    if(!cardId) {
      token = makeToken();
      cardId = phone + '_' + token;
    } else {
      token = String(cardId).split('_')[1] || makeToken();
    }

    const data = {
      telefono: phone,
      token: token,
      nombre: nombre,
      sellos: 0,
      monedero: 0,
      totalSellos: 0,
      premiosGanados: 0,
      premiosCanjeados: 0,
      consentimiento: true,
      creado: serverTimestamp(),
      actualizado: serverTimestamp(),
      movimientos: [{tipo:'alta',qty:0,ts:Date.now(),texto:'Tarjeta creada'}]
    };

    // Guardar en local y mostrar tarjeta rápido. No dejamos al cliente esperando.
    localStorage.setItem('gelateria_phone',phone);
    localStorage.setItem('gelateria_cardId',cardId);
    renderLocalCreatedCard(cardId, {...data, creado:Date.now(), actualizado:Date.now()});
    toast(t('saved'));
    showCeleSimple();

    // Sincronización Firebase con timeout corto.
    const saveCliente = setDoc(doc(db,'clientes',cardId), data, {merge:true});
    const saveTelefono = setDoc(doc(db,'telefonos',phone), {
      cardId: cardId,
      telefono: phone,
      creado: serverTimestamp(),
      actualizado: serverTimestamp()
    }, {merge:true});

    try {
      await withTimeout(Promise.all([saveCliente, saveTelefono]), 6000, 'Firebase tarda demasiado');
      startRealtime(cardId);
    } catch(syncErr) {
      console.error('Firebase sync error', syncErr);
      toast('Guardando… si staff no la ve, espera 2 segundos.');
      // Intenta enganchar realtime de todos modos.
      startRealtime(cardId);
    }
  } catch(e) {
    console.error('crear tarjeta fatal', e);
    toast('Error creando tarjeta');
    alert('No se ha podido crear la tarjeta. Error: ' + (e.code || e.message || e));
    show('form');
  } finally {
    btn.disabled=false;
    btn.textContent=oldText;
  }
}

function startRealtime(cardId) {
  if(unsub) unsub();
  unsub = onSnapshot(doc(db,'clientes',cardId), snap=>{
    if(!snap.exists()) return;
    const data=snap.data();
    if(data.telefono) localStorage.setItem('gelateria_phone',data.telefono);
    localStorage.setItem('gelateria_cardId',cardId);
    renderCard(data);
  }, err=>{
    console.warn('snapshot cliente', err);
  });
}

async function openExisting(cardOrPhone) {
  if(!db) return;
  let cardId=cardOrPhone;
  if(!String(cardOrPhone).includes('_')) {
    const resolved = await resolveCardId(cardOrPhone);
    if(resolved) cardId=resolved;
  }
  if(!cardId) return;
  localStorage.setItem('gelateria_cardId',cardId);
  currentCardId=cardId;
  show('card');

  $('qr').innerHTML='';
  new QRCode($('qr'),{text:cardId,width:210,height:210,colorDark:'#033E3C',colorLight:'#ffffff'});
  startRealtime(cardId);
  renderInstall();
}

function renderCard(c) {
  const sellos=Number(c.sellos||0);
  const mon=Number(c.monedero||0);

  $('hello').textContent=c.nombre?`¡Hola, ${c.nombre}!`:'¡Hola!';
  $('status').className='status'+(mon>0?' prize':'');
  $('status').textContent=mon>0?t('prize'):(sellos===9?t('missing1'):t('missing',{n:10-sellos}));

  $('stamps').innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='stamp '+(i<=sellos?'f':'')+(i>lastSellos&&i<=sellos?' pop':'');
    d.textContent=i<=sellos?'⭐':'';
    $('stamps').appendChild(d);
  }
  lastSellos=sellos;

  $('bar').style.width=(sellos*10)+'%';
  $('count').textContent=t('count',{s:sellos});
  $('wallet').classList.toggle('show',mon>0);
  $('walletTitle').textContent=mon===1?t('wallet1'):t('walletN',{n:mon});

  if(c.lastPremioFlash && Date.now()-c.lastPremioFlash<7000){
    showPrize(c.lastPremioQty||1,sellos);
  }
}

function showCeleSimple() {
  $('celeTitle').textContent=t('cele');
  $('celeText').textContent=t('celeText');
  $('cele').classList.add('show');
  setTimeout(()=>$('cele').classList.remove('show'),1700);
}
function showPrize(n,s) {
  $('celeTitle').textContent=t('cele');
  $('celeText').textContent=t('celeText',{n,s});
  $('cele').classList.add('show');
  setTimeout(()=>$('cele').classList.remove('show'),2400);
}
function renderInstall() {
  const ios=/iPad|iPhone|iPod/.test(navigator.userAgent);
  $('install').classList.add('show');
  $('installTitle').textContent=t('installTitle');
  $('installText').textContent=ios?t('installIos'):t('installAndroid');
}

$('create').onclick=create;
$('shareBtn').onclick=async()=>{
  renderInstall();
  if(navigator.share){
    try{await navigator.share({title:'Mi Tarjeta La Gelateria',url:location.href});}catch(e){}
  }
};
$('deleteBtn').onclick=()=>{
  if(confirm('¿Eliminar esta tarjeta de este móvil?')){
    localStorage.removeItem('gelateria_phone');
    localStorage.removeItem('gelateria_cardId');
    if(unsub) unsub();
    show('form');
  }
};
$('cele').onclick=()=>$('cele').classList.remove('show');

renderLangs();
applyLang();
if('serviceWorker' in navigator) {
