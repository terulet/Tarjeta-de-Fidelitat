<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Mi Tarjeta · La Gelateria de Roses</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#033E3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Tarjeta">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="firebase-config.js"></script>

<style>
  :root{
    --teal:#0B7E7C; --teal-deep:#055552; --teal-darker:#033E3C;
    --gold:#F0B429; --gold-bright:#FFD45E; --gold-deep:#C4910E;
    --cream:#FFFCF5; --ink:#1B3634; --ink-soft:#5C7B79;
    --danger:#B4423A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(255,212,94,0.10), transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(255,212,94,0.07), transparent 50%),
      linear-gradient(160deg, var(--teal-darker) 0%, var(--teal-deep) 55%, var(--teal) 100%);
    min-height:100vh;
    font-family:'Inter', sans-serif;
    color:var(--cream);
    display:flex; justify-content:center; align-items:flex-start;
    padding:26px 18px;
    padding-top:max(26px, env(safe-area-inset-top));
    padding-bottom:max(26px, env(safe-area-inset-bottom));
  }
  .app{ width:100%; max-width:400px; }

  .lang-switch{ display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-bottom:20px; }
  .lang-btn{
    background:transparent; border:1px solid rgba(240,180,41,0.35);
    color:rgba(255,252,245,0.6); font-size:11.5px; font-weight:600; letter-spacing:.04em;
    padding:6px 11px; border-radius:20px; cursor:pointer;
  }
  .lang-btn.active{ background:var(--gold); border-color:var(--gold); color:var(--teal-darker); }

  header{ text-align:center; margin-bottom:22px; }
  .crest{ width:54px; height:54px; margin:0 auto 10px; }
  .crest svg{ width:100%; height:100%; }
  .eyebrow{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-bright); font-weight:600; margin-bottom:7px; }
  h1{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:29px; color:var(--cream); line-height:1.1; }
  h1 .title-main{ color:var(--cream); font-style:normal; }
  h1 .title-accent{ color:var(--gold); font-style:italic; }

  .card{
    background:var(--cream); border-radius:22px; padding:26px 22px;
    box-shadow:0 20px 50px rgba(3,62,60,0.35); border:1px solid rgba(240,180,41,0.4);
    color:var(--ink); text-align:center; position:relative; overflow:hidden;
  }
  .screen{ display:none; }
  .screen.active{ display:block; animation:fadeUp .35s ease both; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ── FORM ─────────────────────────────────────── */
  .form-intro{ font-size:14px; color:var(--ink-soft); margin-bottom:18px; line-height:1.5; }
  .field{ text-align:left; margin-bottom:13px; }
  .field label{ display:block; font-size:11.5px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px; }
  input[type=text], input[type=tel], select{
    width:100%; font-family:'Inter', sans-serif; font-size:17px; font-weight:600;
    padding:13px 14px; border-radius:13px; border:1.5px solid rgba(11,126,124,0.18);
    background:#FAF6EB; color:var(--ink); outline:none;
  }
  input:focus, select:focus{ border-color:var(--gold-deep); }
  .phone-row{ display:flex; gap:8px; }
  .phone-row select{ width:118px; flex:none; padding:13px 6px; font-size:15px; }
  .phone-row input{ flex:1; letter-spacing:.04em; }
  .consent{ display:flex; gap:10px; align-items:flex-start; text-align:left; margin:14px 0 16px; }
  .consent input{ width:20px; height:20px; margin-top:1px; accent-color:var(--teal); flex:none; }
  .consent span{ font-size:12px; color:var(--ink-soft); line-height:1.5; }
  .consent a{ color:var(--teal); font-weight:600; }
  .btn{
    padding:15px; border-radius:14px; border:none; font-family:'Inter', sans-serif;
    font-weight:700; font-size:15px; cursor:pointer; width:100%;
    background:var(--teal-darker); color:var(--gold-bright);
  }
  .btn:active{ transform:scale(0.98); }
  .btn[disabled]{ opacity:.55; }
  .btn-ghost{ background:transparent; color:var(--teal-deep); border:1.5px solid rgba(11,126,124,0.3); }

  /* ── TARJETA VIVA ─────────────────────────────── */
  .hello{ font-family:'Cormorant Garamond', serif; font-size:24px; font-weight:700; color:var(--teal-darker); margin-bottom:2px; }
  .hello-sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }

  .stamps{ display:grid; grid-template-columns:repeat(5,1fr); gap:9px; margin:0 auto 8px; max-width:280px; }
  .stamp{
    aspect-ratio:1; border-radius:50%;
    border:2px dashed rgba(11,126,124,0.30);
    display:flex; align-items:center; justify-content:center;
    color:transparent; background:transparent;
    transition:background .3s;
  }
  .stamp svg{ width:62%; height:62%; }
  .stamp.filled{
    border:2px solid var(--gold-deep);
    background:linear-gradient(150deg, var(--gold-bright), var(--gold));
    color:var(--teal-darker);
    box-shadow:0 3px 10px rgba(196,145,14,0.35);
  }
  .stamp.pop{ animation:stampPop .55s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes stampPop{
    0%{ transform:scale(0) rotate(-30deg); }
    70%{ transform:scale(1.18) rotate(4deg); }
    100%{ transform:scale(1) rotate(0); }
  }
  .stamps-label{ font-size:13px; font-weight:600; color:var(--teal-deep); margin-bottom:2px; }
  .stamps-next{ font-size:11.5px; color:var(--ink-soft); margin-bottom:16px; }

  .wallet{
    display:none; margin:0 auto 16px; padding:12px 14px; border-radius:14px;
    background:linear-gradient(135deg, rgba(240,180,41,0.20), rgba(240,180,41,0.08));
    border:1.5px solid var(--gold); cursor:pointer; max-width:300px;
  }
  .wallet.show{ display:block; animation:fadeUp .4s ease both; }
  .wallet b{ display:block; font-family:'Cormorant Garamond', serif; font-size:18px; color:var(--teal-darker); }
  .wallet span{ font-size:11.5px; color:var(--ink-soft); line-height:1.4; display:block; margin-top:2px; }

  .qr-wrap{
    display:inline-block; padding:14px; background:#fff; border-radius:16px;
    border:1.5px solid rgba(11,126,124,0.15); margin-bottom:10px;
  }
  .qr-note{ font-size:12.5px; color:var(--ink-soft); margin-bottom:14px; line-height:1.5; }

  .review-card{ display:none; margin:4px auto 16px; max-width:320px;
    background:linear-gradient(150deg, rgba(255,212,94,0.22), rgba(240,180,41,0.10));
    border:1.5px solid var(--gold); border-radius:18px; padding:18px 16px 16px; text-align:center; }
  .review-card.show{ display:block; animation:fadeUp .4s ease both; }
  .review-stars{ font-size:19px; letter-spacing:3px; margin-bottom:8px; }
  .review-title{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:20px;
    color:var(--teal-darker); line-height:1.15; margin-bottom:7px; }
  .review-text{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin-bottom:14px; }
  .review-btn{ display:block; text-decoration:none; background:var(--teal-darker); color:var(--gold-bright);
    font-family:'Inter', sans-serif; font-weight:700; font-size:15px; padding:13px; border-radius:13px; }
  .review-btn:active{ transform:scale(.98); }
  .review-foot{ font-size:11px; color:var(--ink-soft); margin-top:9px; }

  .install-banner{
    display:none; margin-top:14px; padding:13px; border-radius:14px;
    background:linear-gradient(135deg, rgba(240,180,41,0.15), rgba(240,180,41,0.05));
    border:1.5px solid rgba(240,180,41,0.4); font-size:12.5px; text-align:left;
  }
  .install-banner.show{ display:block; }
  .install-banner b{ display:block; font-family:'Cormorant Garamond', serif; font-size:15px; margin-bottom:5px; color:var(--teal-darker); }
  .install-steps{ color:var(--ink-soft); line-height:1.55; }
  .install-steps b{ display:inline; font-family:'Inter',sans-serif; font-size:12.5px; color:var(--ink); }

  .delete-link{
    display:inline-block; margin-top:16px; font-size:11px; color:var(--ink-soft);
    text-decoration:underline; background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif;
  }

  /* ── CELEBRACIÓN ──────────────────────────────── */
  .celebration{
    position:fixed; inset:0; z-index:60; display:none;
    align-items:center; justify-content:center; padding:30px;
    background:rgba(3,62,60,0.86); backdrop-filter:blur(4px);
  }
  .celebration.show{ display:flex; }
  .celebration-box{
    background:var(--cream); border-radius:24px; border:2px solid var(--gold);
    padding:34px 26px; text-align:center; max-width:330px; width:100%;
    animation:celebIn .5s cubic-bezier(.2,1.5,.4,1) both; position:relative; overflow:hidden;
  }
  @keyframes celebIn{ from{transform:scale(.6); opacity:0;} to{transform:scale(1); opacity:1;} }
  .celebration-logo{ width:78px; height:78px; border-radius:22px; margin:0 auto 12px; display:block; animation:logoPrize .9s cubic-bezier(.2,1.7,.4,1) both; box-shadow:0 8px 24px rgba(240,180,41,.35); }
  @keyframes logoPrize{ 0%{ transform:scale(.25) rotate(-18deg); opacity:0; } 55%{ transform:scale(1.18) rotate(5deg); opacity:1; } 100%{ transform:scale(1) rotate(0); opacity:1; } }
  .celebration-box .big{ font-size:52px; line-height:1; margin-bottom:12px; }
  .celeb-review{ display:none; margin-top:18px; text-decoration:none; background:var(--teal-darker); color:var(--gold-bright); font-weight:800; padding:13px 16px; border-radius:14px; }
  .celeb-review.show{ display:block; }
  .celebration-box h2{ font-family:'Cormorant Garamond', serif; font-size:26px; color:var(--teal-darker); margin-bottom:8px; }
  .celebration-box p{ font-size:14px; color:var(--ink-soft); line-height:1.5; }
  .confetti{ position:absolute; top:-12px; width:9px; height:14px; border-radius:2px; animation:confFall 1.9s ease-in forwards; }
  @keyframes confFall{
    from{ transform:translateY(-20px) rotate(0deg); opacity:1; }
    to{ transform:translateY(430px) rotate(var(--rot)); opacity:0; }
  }



  /* ── EXPERIENCIA PREMIUM CLIENTE ───────────────────────── */
  .card.premium-card{
    background:
      radial-gradient(circle at 20% 0%, rgba(255,212,94,.10), transparent 35%),
      linear-gradient(170deg, #033E3C 0%, #054D49 58%, #0B7E7C 100%);
    color:var(--cream);
    border:1.5px solid rgba(240,180,41,.65);
    box-shadow:0 24px 70px rgba(0,0,0,.35);
    padding:24px 20px;
  }
  .card.premium-card .hello{ color:var(--cream); font-size:27px; }
  .card.premium-card .hello-sub{ color:rgba(255,252,245,.64); }
  .card.premium-card .stamps-label{ color:var(--gold-bright); letter-spacing:.03em; }
  .card.premium-card .stamps-next{ color:rgba(255,252,245,.82); font-weight:600; }
  .card.premium-card .stamp{ border-color:rgba(255,212,94,.40); }
  .card.premium-card .qr-note{ color:rgba(255,252,245,.70); }
  .card.premium-card .wallet{
    background:linear-gradient(135deg, rgba(255,212,94,.22), rgba(240,180,41,.08));
    border-color:rgba(255,212,94,.75);
    color:var(--cream);
  }
  .card.premium-card .wallet b{ color:var(--gold-bright); }
  .card.premium-card .wallet span{ color:rgba(255,252,245,.80); }
  .premium-home{ margin-top:14px; display:grid; gap:10px; }
  .premium-feature, .premium-link, .premium-mini{
    border:1px solid rgba(240,180,41,.48);
    background:rgba(3,62,60,.34);
    border-radius:16px;
    color:var(--cream);
    text-decoration:none;
    font-family:'Inter',sans-serif;
    box-shadow:0 8px 24px rgba(0,0,0,.13);
  }
  .premium-feature{
    width:100%; cursor:pointer; display:grid; grid-template-columns:1fr 96px 18px;
    gap:12px; align-items:center; padding:13px; text-align:left;
  }
  .premium-feature b, .premium-link b, .premium-mini b{
    display:block; font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--cream); line-height:1.05;
  }
  .premium-feature p, .premium-link span, .premium-mini span{
    display:block; margin-top:5px; font-size:12px; line-height:1.38; color:rgba(255,252,245,.72);
  }
  .premium-arrow{ color:var(--gold-bright); font-size:24px; line-height:1; }
  .story-photo{
    height:76px; border-radius:13px; overflow:hidden;
    border:1px solid rgba(240,180,41,.42);
    background:
      radial-gradient(circle at 60% 28%, rgba(255,252,245,.9) 0 12px, rgba(255,252,245,.0) 13px),
      radial-gradient(circle at 38% 34%, rgba(255,252,245,.82) 0 18px, rgba(255,252,245,.0) 19px),
      linear-gradient(150deg, rgba(240,180,41,.22), rgba(3,62,60,.65)),
      url('icon-512.png') center/55px no-repeat;
    position:relative;
  }
  .story-photo:after{
    content:'🍨'; position:absolute; right:10px; bottom:7px; font-size:27px;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,.35));
  }
  .premium-actions{ display:grid; gap:9px; }
  .premium-link{ display:grid; grid-template-columns:42px 1fr 18px; gap:10px; align-items:center; padding:11px 12px; text-align:left; }
  .premium-ico{
    width:42px; height:42px; border-radius:13px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,212,94,.12); border:1px solid rgba(240,180,41,.35); font-size:22px; color:var(--gold-bright);
  }
  .premium-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .premium-mini{ padding:13px 12px; min-height:104px; text-align:left; }
  .premium-mini .premium-ico{ width:34px; height:34px; font-size:18px; margin-bottom:9px; border-radius:11px; }
  .premium-special{
    display:grid; grid-template-columns:42px 1fr 32px; gap:11px; align-items:center;
    padding:12px; border-radius:16px; border:1px solid rgba(255,212,94,.75);
    background:linear-gradient(135deg, rgba(255,212,94,.18), rgba(3,62,60,.22));
    text-align:left;
  }
  .premium-special b{ font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--gold-bright); }
  .premium-special span{ display:block; margin-top:3px; font-size:12px; line-height:1.35; color:rgba(255,252,245,.76); }
  .premium-special .premium-ico{ width:42px; height:42px; }
  .premium-card .review-card{
    background:linear-gradient(150deg, rgba(255,212,94,.20), rgba(240,180,41,.08));
    color:var(--cream); border-color:rgba(255,212,94,.70);
  }
  .premium-card .review-title{ color:var(--cream); }
  .premium-card .review-text, .premium-card .review-foot{ color:rgba(255,252,245,.75); }
  .premium-card .install-banner{ color:var(--cream); background:rgba(255,212,94,.08); }
  .premium-card .install-banner b{ color:var(--gold-bright); }
  .premium-card .install-steps, .premium-card .delete-link{ color:rgba(255,252,245,.70); }

  /* ── MODAL / TOAST ────────────────────────────── */
  .modal{ position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center; padding:26px; background:rgba(3,62,60,0.8); }
  .modal.show{ display:flex; }
  .modal-box{ background:var(--cream); border-radius:20px; padding:24px 20px; max-width:330px; width:100%; text-align:center; color:var(--ink); }
  .modal-box h3{ font-family:'Cormorant Garamond', serif; font-size:21px; color:var(--teal-darker); margin-bottom:8px; }
  .modal-box p{ font-size:13px; color:var(--ink-soft); line-height:1.5; margin-bottom:16px; }
  .modal-box .btn{ margin-bottom:9px; }
  .btn-danger{ background:var(--danger); color:#fff; }

  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(80px);
    background:var(--teal-darker); color:var(--cream); border:1px solid var(--gold);
    font-size:13px; font-weight:600; padding:11px 18px; border-radius:30px;
    z-index:80; transition:transform .3s ease; max-width:88vw; text-align:center;
  }
  .toast.show{ transform:translateX(-50%) translateY(0); }

  footer{ text-align:center; margin-top:18px; font-size:11px; color:rgba(255,252,245,0.4); }
  footer a{ color:rgba(255,252,245,0.55); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="lang-switch" id="langSwitch"></div>

  <header>
    <div class="crest">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="18" r="9" stroke="#F0B429" stroke-width="3"/>
        <circle cx="38" cy="30" r="9" stroke="#F0B429" stroke-width="3"/>
        <circle cx="62" cy="30" r="9" stroke="#F0B429" stroke-width="3"/>
        <path d="M30 38 L70 38 L50 78 Z" stroke="#F0B429" stroke-width="3" stroke-linejoin="round"/>
        <path d="M40 48 L60 48 L50 64 Z" stroke="#F0B429" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="eyebrow">La Gelateria de Roses</div>
    <h1><span class="title-main" id="titleA"></span><span class="title-accent" id="titleB"></span></h1>
  </header>

  <div class="card">

    <!-- REGISTRO -->
    <div class="screen" id="screenForm">
      <div class="form-intro" id="tFormIntro"></div>
      <div class="field">
        <label id="tNameLabel" for="nameInput"></label>
        <input type="text" id="nameInput" maxlength="40" autocomplete="given-name">
      </div>
      <div class="field">
        <label id="tPhoneLabel" for="phoneInput"></label>
        <div class="phone-row">
          <select id="prefixSelect"></select>
          <input type="tel" id="phoneInput" placeholder="6XX XXX XXX" inputmode="numeric" maxlength="12">
        </div>
      </div>
      <label class="consent">
        <input type="checkbox" id="consentCheck">
        <span id="tConsent"></span>
      </label>
      <button class="btn" id="btnCrear"></button>
    </div>

    <!-- MÓVIL YA REGISTRADO -->
    <div class="screen" id="screenExiste">
      <div style="font-size:44px; margin-bottom:10px;">🪪</div>
      <div class="hello" id="tExisteTitle"></div>
      <p class="form-intro" id="tExisteText" style="margin-top:8px;"></p>
      <button class="btn btn-ghost" id="btnVolver"></button>
    </div>

    <!-- TARJETA VIVA -->
    <div class="screen" id="screenCard">
      <div class="hello" id="helloLine"></div>
      <div class="hello-sub" id="phonePretty"></div>

      <div class="stamps" id="stampsGrid"></div>
      <div class="stamps-label" id="stampsLabel"></div>
      <div class="stamps-next" id="stampsNext"></div>

      <div class="wallet" id="walletBox">
        <b id="walletTitle"></b>
        <span id="walletText"></span>
      </div>

      <div class="qr-wrap"><div id="qrcode"></div></div>
      <div class="qr-note" id="tQrNote"></div>

      <div class="premium-home" id="premiumHome">
        <button class="premium-feature" id="historyCardBtn" type="button">
          <div>
            <b id="storyTitle"></b>
            <p id="storyText"></p>
          </div>
          <div class="story-photo" aria-hidden="true"></div>
          <div class="premium-arrow">›</div>
        </button>

        <div class="premium-actions">
          <a class="premium-link" id="instagramLink" href="https://www.instagram.com/lagelateriaderoses/" target="_blank" rel="noopener">
            <div class="premium-ico">📸</div>
            <div><b id="instaTitle"></b><span id="instaText"></span></div>
            <div class="premium-arrow">›</div>
          </a>
          <a class="premium-link" id="webLink" href="https://lagelateriaderoses.com/" target="_blank" rel="noopener">
            <div class="premium-ico">🌍</div>
            <div><b id="webTitle"></b><span id="webText"></span></div>
            <div class="premium-arrow">›</div>
          </a>
        </div>

        <div class="premium-grid">
          <div class="premium-mini">
            <div class="premium-ico">🍓</div>
            <b id="seasonTitle"></b>
            <span id="seasonText"></span>
          </div>
          <div class="premium-mini">
            <div class="premium-ico">🏆</div>
            <b id="achievementsTitle"></b>
            <span id="achievementsText"></span>
          </div>
        </div>

        <div class="premium-special">
          <div class="premium-ico">⭐</div>
          <div><b id="specialTitle"></b><span id="specialText"></span></div>
          <div class="premium-ico">🥤</div>
        </div>
      </div>

      deleteLink:'Mijn kaart en gegevens verwijderen',
      delTitle:'Je kaart verwijderen?',
      delText:'Je nummer, naam, stempels en beloningen worden definitief gewist. Dit kan niet ongedaan worden gemaakt.',
      delBtn:'Ja, alles verwijderen', cancel:'Annuleren',
      footer:'La Gelateria de Roses · Digitale kaart', footerPriv:'Privacy',
      errPhone:'Vul een geldig mobiel nummer in', errConsent:'Vink het toestemmingsvakje aan om door te gaan', errNet:'Geen verbinding. Probeer opnieuw.',
      cardDeleted:'Je kaart is verwijderd',
      celebTitle:'Beloning verdiend!', celebText:'Kaart vol: {p}. Hij staat in je portemonnee 🎁',
      halfToast:'Al op de helft van je kaart! 🎉'
    }
  };

  const PREFIXES = [
    ['34','🇪🇸 +34'],['33','🇫🇷 +33'],['49','🇩🇪 +49'],['31','🇳🇱 +31'],['32','🇧🇪 +32'],
    ['44','🇬🇧 +44'],['41','🇨🇭 +41'],['39','🇮🇹 +39'],['351','🇵🇹 +351'],['43','🇦🇹 +43'],
    ['353','🇮🇪 +353'],['45','🇩🇰 +45'],['46','🇸🇪 +46'],['48','🇵🇱 +48'],['420','🇨🇿 +420'],
    ['352','🇱🇺 +352'],['1','🇺🇸 +1']
  ];

  /* ══════════ ESTADO ══════════ */
  const $ = id => document.getElementById(id);
  let lang = localStorage.getItem('gelateria_lang') || detectLang();
  let db = null;
  let unsubCard = null, unsubCfg = null;
  let currentCardId = null, currentData = null;
  let prevSellos = null, prevMonedero = null;
  let qrRendered = null;
  let cfg = { objetivoSellos: 10, premioTexto: '', reviewUrl: 'https://g.page/r/CaVSamGk-7L3EBM/review' };

  function detectLang(){
    const nav = (navigator.language || 'es').slice(0,2).toLowerCase();
    return T[nav] ? nav : 'es';
  }
  function t(key, vars){
    let s = (T[lang] && T[lang][key]) || T.es[key] || '';
    if(vars) for(const k in vars) s = s.replaceAll('{'+k+'}', vars[k]);
    return s;
  }

  /* ══════════ UI BÁSICA ══════════ */
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
    const mainCard = document.querySelector('.card');
    if(mainCard) mainCard.classList.toggle('premium-card', id === 'screenCard');
    // El idioma se elige una vez al registrarse.
    // Cuando la tarjeta ya existe, usamos el idioma guardado y ocultamos el selector.
    const sw = $('langSwitch');
    if(sw) sw.style.display = (id === 'screenForm' || id === 'screenExiste') ? 'flex' : 'none';
  }
  let toastTimer = null;
  function toast(msg){
    const el = $('toast'); el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
  }
  function buildLangSwitch(){
    const el = $('langSwitch'); el.innerHTML = '';
    LANGS.forEach(([code,label]) => {
      const b = document.createElement('button');
      b.className = 'lang-btn' + (code === lang ? ' active' : '');
      b.textContent = label;
      b.onclick = () => { lang = code; localStorage.setItem('gelateria_lang', code); applyLang(); };
      el.appendChild(b);
    });
  }
  function applyLang(){
    buildLangSwitch();
    document.documentElement.lang = lang;
    $('titleA').textContent = t('titleA');
    $('titleB').textContent = t('titleB');
    $('tFormIntro').textContent = t('formIntro');
    $('tNameLabel').textContent = t('nameLabel');
    $('nameInput').placeholder = t('namePh');
    $('tPhoneLabel').textContent = t('phoneLabel');
    $('tConsent').innerHTML = t('consent');
    $('btnCrear').textContent = t('formBtn');
    $('tExisteTitle').textContent = t('existeTitle');
    $('tExisteText').textContent = t('existeText');
    $('btnVolver').textContent = t('existeBack');
    $('tQrNote').textContent = t('qrNote');
    $('storyTitle').textContent = t('storyTitle');
    $('storyText').textContent = t('storyText');
    $('storyModalTitle').textContent = t('storyModalTitle');
    $('storyModalText').textContent = t('storyModalText');
    $('storyClose').textContent = t('storyClose');
    $('instaTitle').textContent = t('instaTitle');
    $('instaText').textContent = t('instaText');
    $('webTitle').textContent = t('webTitle');
    $('webText').textContent = t('webText');
    $('seasonTitle').textContent = t('seasonTitle');
    $('seasonText').textContent = t('seasonText');
    $('achievementsTitle').textContent = t('achievementsTitle');
    $('specialTitle').textContent = t('specialTitle');
    $('specialText').textContent = t('specialText');
    $('tReviewTitle').textContent = t('reviewTitle');
    $('tReviewText').textContent = t('reviewText');
    $('tReviewBtn').textContent = t('reviewBtn');
    $('tReviewFoot').textContent = t('reviewFoot');
    $('tInstallTitle').textContent = t('installTitle');
    renderInstallSteps();
    $('btnDelete').textContent = t('deleteLink');
    $('tDelTitle').textContent = t('delTitle');
    $('tDelText').textContent = t('delText');
    $('btnDelConfirm').textContent = t('delBtn');
    $('btnDelCancel').textContent = t('cancel');
    $('tFooter').textContent = t('footer');
    $('tFooterPriv').textContent = t('footerPriv');
    if(currentData) renderCard(currentData, false);
  }
  function renderInstallSteps(){
    const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
    $('installSteps').innerHTML = isIos ? t('installIos') : t('installAndroid');
  }

  /* ══════════ HELPERS ══════════ */
  function genToken(){
    const alphabet = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    const arr = new Uint32Array(6);
    crypto.getRandomValues(arr);
    let out = '';
    for(let i = 0; i < 6; i++) out += alphabet[arr[i] % alphabet.length];
    return out;
  }
  function prettyPhone(tel){
    for(const [p] of PREFIXES){
      if(tel.startsWith(p) && tel.length > p.length + 5){
        const nat = tel.slice(p.length);
        return '+' + p + ' ' + nat.replace(/(\d{3})(?=\d)/g, '$1 ').trim();
      }
    }
    return '+' + tel;
  }

  /* ══════════ TARJETA VIVA ══════════ */
  function openCard(cardId){
    currentCardId = cardId;
    prevSellos = null; prevMonedero = null;
    showScreen('screenCard');

    // QR (una sola vez por tarjeta)
    if(qrRendered !== cardId){
      $('qrcode').innerHTML = '';
      new QRCode($('qrcode'), {
        text: 'GELROSES:' + cardId, width: 190, height: 190,
        colorDark: '#033E3C', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrRendered = cardId;
    }

    // Banner de instalación
    const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    $('installBanner').classList.toggle('show', !standalone);

    if(unsubCard) unsubCard();
    unsubCard = onSnapshot(doc(db, 'clientes', cardId), snap => {
      if(!snap.exists()){
        // Tarjeta eliminada (por el cliente o transferida a otro móvil desde el mostrador)
        unsubCard(); unsubCard = null;
        localStorage.removeItem('gelateria_card');
        currentCardId = null; currentData = null; qrRendered = null;
        toast(t('cardDeleted'));
        showScreen('screenForm');
        return;
      }
      renderCard(snap.data(), true);
    }, () => toast(t('errNet')));
  }

  function renderCard(d, animate){
    // La tarjeta recuerda el idioma elegido en el primer registro.
    // Así el cliente no tiene que volver a escoger idioma cada vez que abre la app.
    if(d.idioma && T[d.idioma] && d.idioma !== lang){
      lang = d.idioma;
      localStorage.setItem('gelateria_lang', lang);
      applyLang();
    }
    currentData = d;
    const objetivo = cfg.objetivoSellos || 10;

    $('helloLine').textContent = d.nombre ? t('helloName', {n: d.nombre}) : t('hello');
    $('phonePretty').textContent = prettyPhone(d.telefono);

    // Sellos
    const grid = $('stampsGrid');
    grid.style.gridTemplateColumns = 'repeat(' + Math.min(objetivo, 5) + ',1fr)';
    grid.innerHTML = '';
    for(let i = 0; i < objetivo; i++){
      const s = document.createElement('div');
      s.className = 'stamp' + (i < d.sellos ? ' filled' : '');
      s.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="7.5" r="4.2" stroke="currentColor" stroke-width="2"/><path d="M6.8 12.6 L17.2 12.6 L12 21 Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
      if(animate && prevSellos !== null && i >= prevSellos && i < d.sellos){
        s.classList.add('pop');
        s.style.animationDelay = ((i - prevSellos) * 0.12) + 's';
      }
      grid.appendChild(s);
    }
    $('stampsLabel').textContent = t('stampsLabel', {s: d.sellos, o: objetivo});
    const restan = objetivo - d.sellos;
    $('stampsNext').textContent = restan === 1 ? t('stampsNext1') : t('stampsNext', {r: restan});
    $('achievementsText').textContent = t('achievementsText', {s: d.totalSellos || d.sellos || 0, p: d.premiosGanados || 0});

    // Monedero
    const w = $('walletBox');
    if(d.monedero > 0){
      w.classList.add('show');
      $('walletTitle').textContent = '🎁 ' + (d.monedero === 1 ? t('walletOne') : t('walletMany', {n: d.monedero}));
      $('walletText').textContent = (cfg.premioTexto ? t('premio', {p: cfg.premioTexto}) + ' · ' : '') + t('walletHow');
    } else {
      w.classList.remove('show');
    }

    // Reseña: no molestar al principio. Solo aparece al cabo de 5 premios/canjes.
    const reviewReady = ((d.premiosGanados || 0) >= 5 || (d.canjes || 0) >= 5);
    if(cfg.reviewUrl && reviewReady && !d.resenaPedida){
      $('reviewCta').href = cfg.reviewUrl;
      $('reviewCard').classList.add('show');
    } else {
      $('reviewCard').classList.remove('show');
    }

    // Celebraciones (solo en cambios reales, no en la primera carga)
    if(animate && prevMonedero !== null && d.monedero > prevMonedero){
      celebrate();
    } else if(animate && prevSellos !== null && prevSellos < 5 && d.sellos >= 5 && d.sellos < objetivo){
      toast(t('halfToast'));
    }

    prevSellos = d.sellos;
    prevMonedero = d.monedero;
  }

  function celebrate(){
    $('celebTitle').textContent = t('celebTitle');
    $('celebText').textContent = t('celebText', {p: cfg.premioTexto || '🍦'});
    const reviewReady = currentData && ((currentData.premiosGanados || 0) >= 5 || (currentData.canjes || 0) >= 5);
    const cr = $('celebReview');
    if(cfg.reviewUrl && reviewReady && currentData && !currentData.resenaPedida){
      cr.href = cfg.reviewUrl;
      cr.textContent = t('reviewPrizeBtn');
      cr.classList.add('show');
      $('celebText').textContent = t('celebText', {p: cfg.premioTexto || '🍦'}) + ' ' + t('reviewThanks');
    } else {
      cr.classList.remove('show');
      cr.removeAttribute('href');
    }
    const box = $('celebBox');
    box.querySelectorAll('.confetti').forEach(c => c.remove());
    const colors = ['#F0B429','#FFD45E','#0B7E7C','#C4910E','#FFFCF5'];
    for(let i = 0; i < 16; i++){
      const c = document.createElement('span');
      c.className = 'confetti';
      c.style.left = (Math.random() * 96) + '%';
      c.style.background = colors[i % colors.length];
      c.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      box.appendChild(c);
    }
    $('celebration').classList.add('show');
    setTimeout(() => $('celebration').classList.remove('show'), 4200);
  }
  $('celebration').addEventListener('click', () => $('celebration').classList.remove('show'));

  /* ══════════ REGISTRO ══════════ */
  function buildPrefixes(){
    const sel = $('prefixSelect');
    PREFIXES.forEach(([val, label]) => {
      const o = document.createElement('option');
      o.value = val; o.textContent = label;
      sel.appendChild(o);
    });
    sel.value = '34';
  }

  async function crearTarjeta(){
    const btn = $('btnCrear');
    const nombre = $('nameInput').value.trim().slice(0, 40);
    const prefix = $('prefixSelect').value;
    let nat = $('phoneInput').value.replace(/\D/g, '');
    if(nat.startsWith('0') && prefix !== '39' && prefix !== '34') nat = nat.replace(/^0+/, '');
    const telefono = prefix + nat;

    if(nat.length < 6 || telefono.length < 8 || telefono.length > 15){ toast(t('errPhone')); return; }
    if(!$('consentCheck').checked){ toast(t('errConsent')); return; }

    btn.disabled = true;
    try{
      const telRef = doc(db, 'telefonos', telefono);
      const telSnap = await getDoc(telRef);
      if(telSnap.exists() && telSnap.data().cardId){
        // Ya hay tarjeta para este móvil: la recuperamos y la abrimos aquí mismo.
        const existingId = telSnap.data().cardId;
        const cSnap = await getDoc(doc(db, 'clientes', existingId));
        if(cSnap.exists()){
          localStorage.setItem('gelateria_card', existingId);
          openCard(existingId);
          return;
        }
        // Si el índice apunta a una tarjeta borrada, lo ignoramos y creamos nueva.
      }
      const token = genToken();
      const cardId = telefono + '_' + token;
      const batch = writeBatch(db);
      batch.set(doc(db, 'clientes', cardId), {
        telefono, token,
        nombre, idioma: lang,
        sellos: 0, monedero: 0, totalSellos: 0,
        visitas: 0, canjes: 0, premiosGanados: 0,
        resenaPedida: false, consentimiento: true,
        creado: serverTimestamp(), ultimoSello: null,
        hoyFecha: '', hoyN: 0
      });
      batch.set(telRef, { cardId: cardId });
      await batch.commit();
      localStorage.setItem('gelateria_card', cardId);
      openCard(cardId);
    }catch(e){
      console.error(e);
      toast(t('errNet'));
    }finally{
      btn.disabled = false;
    }
  }

  /* ══════════ BORRAR TARJETA (RGPD) ══════════ */
  $('btnDelete').onclick = () => $('modalDelete').classList.add('show');
  $('btnDelCancel').onclick = () => $('modalDelete').classList.remove('show');
  $('btnDelConfirm').onclick = async () => {
    if(!currentCardId || !currentData) return;
    $('btnDelConfirm').disabled = true;
    try{
      const batch = writeBatch(db);
      batch.delete(doc(db, 'clientes', currentCardId));
      batch.delete(doc(db, 'telefonos', currentData.telefono));
      await batch.commit();
      $('modalDelete').classList.remove('show');
      // el onSnapshot detecta la eliminación y devuelve al registro
    }catch(e){
      console.error(e);
      toast(t('errNet'));
    }finally{
      $('btnDelConfirm').disabled = false;
    }
  };

  /* ══════════ ARRANQUE ══════════ */
  $('btnCrear').onclick = crearTarjeta;
  $('btnVolver').onclick = () => showScreen('screenForm');
  $('historyCardBtn').onclick = () => $('modalStory').classList.add('show');
  $('storyClose').onclick = () => $('modalStory').classList.remove('show');
  $('reviewCta').onclick = async () => {
    if(!currentCardId || !db) return;
    try{ await setDoc(doc(db, 'clientes', currentCardId), { resenaPedida:true, fechaResenaPedida:serverTimestamp() }, { merge:true }); }catch(e){}
  };
  $('celebReview').onclick = async () => {
    if(!currentCardId || !db) return;
    try{ await setDoc(doc(db, 'clientes', currentCardId), { resenaPedida:true, fechaResenaPedida:serverTimestamp() }, { merge:true }); }catch(e){}
  };

  // Limpieza de la v1 (localStorage antiguo)
  localStorage.removeItem('mi_telefono');
  localStorage.removeItem('gelateria_clientes');

  buildPrefixes();
  applyLang();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  const CFG = window.FIREBASE_CONFIG || {};
  if(!CFG.apiKey || CFG.apiKey.includes('PEGAR')){
    showScreen('screenSetup');
  } else {
    const app = initializeApp(CFG);
    try{
      db = initializeFirestore(app, { localCache: persistentLocalCache() });
    }catch(e){
      db = initializeFirestore(app, {});
    }

    // Config pública en vivo (objetivo, premio, reseña)
    unsubCfg = onSnapshot(doc(db, 'config', 'publico'), snap => {
      if(snap.exists()){
        cfg = Object.assign(cfg, snap.data());
        if(currentData) renderCard(currentData, false);
      }
    }, () => {});

    // ¿Llega con una tarjeta en la URL? (transferencia desde el mostrador)
    const params = new URLSearchParams(location.search);
    const urlCard = params.get('c');

    (async () => {
      if(urlCard && /^[0-9]{8,15}_[A-Z2-9]{6}$/.test(urlCard)){
        try{
          const snap = await getDoc(doc(db, 'clientes', urlCard));
          if(snap.exists()){
            localStorage.setItem('gelateria_card', urlCard);
            history.replaceState(null, '', location.pathname);
            openCard(urlCard);
            return;
          }
        }catch(e){ /* sigue el flujo normal */ }
      }
      const stored = localStorage.getItem('gelateria_card');
      if(stored){
        openCard(stored);
      } else {
        showScreen('screenForm');
      }
    })();
  }
</script>

</body>
