<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test cámara + QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  body{ font-family:sans-serif; background:#111; color:#eee; padding:16px; text-align:center; }
  video{ width:100%; max-width:400px; border:2px solid #0f0; border-radius:12px; }
  #log{ text-align:left; background:#000; color:#0f0; font-family:monospace; font-size:12px;
    padding:12px; border-radius:8px; margin-top:12px; white-space:pre-wrap; min-height:120px; }
  .hit{ color:#ff0; font-weight:bold; font-size:16px; }
  button{ font-size:16px; padding:12px 20px; margin:8px; border-radius:10px; border:none; background:#0a0; color:#fff; }
</style>
</head>
<body>
  <h2>Test de cámara + lectura QR</h2>
  <button id="start">▶️ Encender cámara</button>
  <button id="flip">🔄 Cambiar cámara</button>
  <br>
  <video id="video" playsinline muted></video>
  <div id="log">Pulsa "Encender cámara" y apunta a cualquier QR.</div>

<script>
  const video = document.getElementById('video');
  const log = document.getElementById('log');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  let stream = null, scanning = false, facing = 'environment', frames = 0, lastReport = 0;

  function L(msg){ log.textContent = msg + '\n' + log.textContent.slice(0, 2000); }

  async function start(){
    if(stream) stream.getTracks().forEach(t => t.stop());
    scanning = false;
    L('Protocolo: ' + location.protocol + '  (debe ser https:)');
    if(typeof jsQR === 'undefined'){ L('❌ ERROR: jsQR NO cargó (¿bloqueado el CDN?)'); return; }
    L('✓ jsQR cargado correctamente');
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width:{ideal:1280}, height:{ideal:960} }, audio:false
      });
      video.srcObject = stream;
      await video.play();
      scanning = true; frames = 0;
      L('✓ Cámara encendida. Escaneando...');
      requestAnimationFrame(loop);
    }catch(e){
      L('❌ ERROR al abrir cámara: ' + e.name + ' — ' + e.message);
    }
  }

  function loop(){
    if(!scanning) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
      frames++;
      if(Date.now() - lastReport > 1000){
        lastReport = Date.now();
        L('Frames leídos: ' + frames + ' | Vídeo: ' + canvas.width + 'x' + canvas.height +
          (code ? '' : ' | (sin QR en pantalla)'));
      }
      if(code && code.data){
        L('✅✅✅ QR DETECTADO: ' + code.data);
        document.querySelector('h2').innerHTML = '<span class="hit">✅ ' + code.data + '</span>';
      }
    } else {
      if(Date.now() - lastReport > 1000){
        lastReport = Date.now();
        L('⏳ Vídeo aún no listo (readyState=' + video.readyState + ')');
      }
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('start').onclick = start;
  document.getElementById('flip').onclick = () => { facing = facing === 'environment' ? 'user' : 'environment'; start(); };
</script>
</body>
</html>
